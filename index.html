// ── JSONbin ──────────────────────────────────────────────────────────
const JB = "https://api.jsonbin.io/v3/b";
async function jbRead(k, id) {
  const r = await fetch(`${JB}/${id}/latest`, {
    headers: {
      "X-Master-Key": k
    }
  });
  if (!r.ok) throw new Error(r.status);
  return (await r.json()).record;
}
async function jbWrite(k, id, d) {
  const r = await fetch(`${JB}/${id}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "X-Master-Key": k
    },
    body: JSON.stringify(d)
  });
  if (!r.ok) throw new Error(r.status);
}
async function jbCreate(k, d) {
  const r = await fetch(JB, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-Master-Key": k,
      "X-Bin-Name": "delivery"
    },
    body: JSON.stringify(d)
  });
  if (!r.ok) throw new Error(r.status);
  return (await r.json()).metadata.id;
}

async function analyzeImg(ak, b64, mime) {
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": ak,
      "anthropic-version": "2023-06-01"
    },
    body: JSON.stringify({
      model: "claude-haiku-4-5-20251001",
      max_tokens: 800,
      messages: [{
        role: "user",
        content: [{
          type: "image",
          source: {
            type: "base64",
            media_type: mime,
            data: b64
          }
        }, {
          type: "text",
          text: `このデリバリーアプリのスクリーンショットから配達記録を抽出してください。以下のJSONのみ返してください（コードブロック・説明文不要）:\n{"date":"YYYY-MM-DD","service":"ロケット","total_amount":数値,"deliveries":[{"time":"HH:MM","amount":数値,"distance_km":数値またはnull,"pick":"店舗名","drop":"配達先エリア"}]}\nserviceは「ロケット」「Uber Eats」「出前館」「その他」から選択。日付不明なら今日。距離不明ならnull。`
        }]
      }]
    })
  });
  const d = await r.json();
  const txt = d.content?.find(c => c.type === "text")?.text || "";
  return JSON.parse(txt.replace(/```json|```/g, "").trim());
}
