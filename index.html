// ── JSONbin ──────────────────────────────────────────────────────────
const JB = "https://api.jsonbin.io/v3/b";
async function jbRead(k, id) {
  const r = await fetch(`${JB}/${id}/latest`, {
    headers: {
      "X-Master-Key": k
    }
  });
  if (!r.ok) throw new Error(r.status);
  return (await r.json()).record;
}
async function jbWrite(k, id, d) {
  const r = await fetch(`${JB}/${id}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "X-Master-Key": k
    },
    body: JSON.stringify(d)
  });
  if (!r.ok) throw new Error(r.status);
}
async function jbCreate(k, d) {
  const r = await fetch(JB, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-Master-Key": k,
      "X-Bin-Name": "delivery"
    },
    body: JSON.stringify(d)
  });
  if (!r.ok) throw new Error(r.status);
  return (await r.json()).metadata.id;
}

function App() {
  const [step, setStep] = useState("loading");
  const [sessions, setSessions] = useState([]);
  const [expenses, setExpenses] = useState({});
  const [tab, setTab] = useState("home");
  const [status, setStatus] = useState("");
  const [addStep, setAddStep] = useState("pick");
  const [draft, setDraft] = useState(null);
  const [addErr, setAddErr] = useState("");
  const [extracting, setExtracting] = useState(false);
  const [openId, setOpenId] = useState(null);
  const [logs, setLogs] = useState({});
  const [detailDate, setDetailDate] = useState(null);
  const [logViewMode, setLogViewMode] = useState("session");
  const fileRef = useRef();
  const timer = useRef();
  // refs: 常に最新値を保持（stale closure対策）
  const sessRef = useRef([]);
  const expRef = useRef({});
  const logRef = useRef({});
  useEffect(() => {
    sessRef.current = sessions;
  }, [sessions]);
  useEffect(() => {
    expRef.current = expenses;
  }, [expenses]);
  useEffect(() => {
    logRef.current = logs;
  }, [logs]);
  const getJB = () => localStorage.getItem(LS.JB) || "";
  const getBIN = () => localStorage.getItem(LS.BIN) || "";
  const getAK = () => localStorage.getItem(LS.AK) || "";
  useEffect(() => {
    if (!localStorage.getItem(LS.JB) || !localStorage.getItem(LS.BIN)) {
      setStep("setup");
      return;
    }
    jbRead(getJB(), getBIN()).then(d => {
      const s = d?.sessions || SEED;
      const e = d?.expenses || SEED_EXP;
      const l = d?.logs || SEED_LOGS;
      setSessions(s);
      setExpenses(e);
      setLogs(l);
      sessRef.current = s;
      expRef.current = e;
      logRef.current = l;
      setStep("main");
    }).catch(() => {
      setSessions(SEED);
      setExpenses(SEED_EXP);
      setLogs(SEED_LOGS);
      sessRef.current = SEED;
      expRef.current = SEED_EXP;
      logRef.current = SEED_LOGS;
      setStep("main");
    });
  }, []);

  // 即時保存 + 読み返し検証（refsから読むのでstale closure問題なし）
  const forceSave = useCallback(async overSess => {
    if (timer.current) clearTimeout(timer.current);
    const s = overSess || sessRef.current;
    const e = expRef.current;
    const l = logRef.current;
    const k = getJB(),
      id = getBIN();
    if (!k || !id) {
      setStatus("ERR:キーまたはBinID未設定");
      return;
    }
    setStatus("saving");
    try {
      await jbWrite(k, id, {
        sessions: s,
        expenses: e,
        logs: l || {}
      });
      // 書き込み後すぐに読み返して検証
      const verify = await jbRead(k, id);
      const wCount = s.length;
      const rCount = verify?.sessions?.length || 0;
      if (rCount >= wCount) {
        setStatus(`saved:${wCount}`);
        setTimeout(() => setStatus(""), 6000);
      } else {
        setStatus(`ERR:書込${wCount}件→読取${rCount}件 BinID:${id.slice(0, 8)}`);
      }
    } catch (err) {
      setStatus("ERR:" + err.message.slice(0, 60));
    }
  }, []);

  // デバウンス保存（入力中など）
  const doSave = useCallback(() => {
    if (timer.current) clearTimeout(timer.current);
    setStatus("saving");
    timer.current = setTimeout(() => forceSave(), [2000]);
  }, [forceSave]);
  const updSessions = useCallback(s => {
    setSessions(s);
    sessRef.current = s;
    doSave();
  }, [doSave]);
  const updExpenses = useCallback(e => {
    setExpenses(e);
    expRef.current = e;
    doSave();
  }, [doSave]);
  const updLogs = useCallback(l => {
    setLogs(l);
    logRef.current = l;
    doSave();
  }, [doSave]);
  const updateSession = useCallback(s => {
    const next = sessRef.current.map(x => x.id === s.id ? s : x).sort((a, b) => b.date.localeCompare(a.date));
    setSessions(next);
    sessRef.current = next;
    forceSave(next);
  }, [forceSave]);
  const updateDayLog = useCallback((date, updates) => {
    const next = {
      ...logRef.current,
      [date]: {
        ...(logRef.current[date] || {}),
        ...updates
      }
    };
    updLogs(next);
  }, [updLogs]);
  const saveSession = useCallback(s => {
    const next = [...sessRef.current.filter(x => x.id !== s.id), s].sort((a, b) => b.date.localeCompare(a.date));
    setSessions(next);
    sessRef.current = next;
    forceSave(next);
    setTab("log");
    setAddStep("pick");
    setDraft(null);
    setAddErr("");
  }, [forceSave]);
  const delSession = useCallback(id => {
    const next = sessRef.current.filter(x => x.id !== id);
    setSessions(next);
    sessRef.current = next;
    forceSave(next);
    setOpenId(null);
  }, [forceSave]);
  const handleFile = useCallback(async file => {
    const ak = getAK();
    if (!ak) {
      setAddErr("Anthropic APIキーが未設定です。分析タブの設定から追加してください。");
      return;
    }
    setExtracting(true);
    setAddErr("");
    try {
      const b64 = await new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result.split(",")[1]);
        r.onerror = rej;
        r.readAsDataURL(file);
      });
      const result = await analyzeImg(ak, b64, file.type || "image/jpeg");
      const dels = (result.deliveries || []).map(d => ({
        id: uid(),
        time: d.time || "",
        amount: d.amount || 0,
        distance: d.distance_km || null,
        pick: d.pick || "",
        drop: d.drop || "",
        memo: "",
        _quest: !!(d._quest || isQuestName(d.pick))
      }));
      if (!dels.length) dels.push({
        id: uid(),
        time: "",
        amount: result.total_amount || 0,
        distance: null,
        pick: "",
        drop: "",
        memo: "",
        _agg: true
